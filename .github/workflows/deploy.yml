name: Deploy to Databricks (simple)

on:
  push:
    branches:
      - features/added_notebook2   # branch that triggers deploy
  workflow_dispatch:              # optional: allows manual run

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Databricks CLI & bundle
        run: |
          python -m pip install --upgrade pip
          pip install databricks-cli databricks-sdk databricks-bundle
          databricks --version

      - name: Deploy bundle to dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle deploy --target dev
