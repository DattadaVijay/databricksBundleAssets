name: Deploy to Databricks (simple)

on:
  push:
    branches:
      - main    # change to the branch you want to trigger deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Databricks CLI (and bundle)
        run: |
          python -m pip install --upgrade pip
          pip install databricks-cli databricks-sdk databricks-bundle || true
          databricks --version || true

      - name: Deploy bundle to dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          # if your databricks.yml is in the 'bundle' folder, cd there:
          databricks bundle deploy --target dev
