name: Deploy to Databricks (simple)

on:
  push:
    branches:
      - features/added_notebook2
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev libffi-dev libssl-dev

      - name: Install Databricks CLI & bundle
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install databricks-cli databricks-sdk databricks-bundle
          databricks --version

      - name: Deploy bundle to dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle deploy --target dev
