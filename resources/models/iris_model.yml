# databricks-gemma-foundation.yml
bundle:
  name: my-foundation-model-bundle

resources:
  model_serving_endpoints:
    my_foundation_model_endpoint:
      name: my-foundation-model-endpoint      # Endpoint name in Databricks
      tags:
        - key: environment
          value: dev
        - key: project
          value: gemma-3-12b-fm
        - key: owner
          value: your-name
      foundation_model:
        model_name: gemma-3-12b             # Prebuilt Gemma model
        model_version: 1
        task: text-generation               # chat, text-generation, embeddings
        workload_type: CPU                  # CPU or GPU
        workload_size: Small                # Small, Medium, Large
        scale_to_zero_enabled: true
